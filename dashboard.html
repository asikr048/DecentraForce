<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NonAcademy Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .progress-bar {
            height: 8px;
            background-color: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #10b981;
            width: 7%;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen">
        <!-- Left Sidebar -->
        <div class="w-64 bg-white fixed h-full shadow-md">
            <!-- Logo Area -->
            <div class="p-6 border-b">
                <h1 class="text-2xl font-bold text-blue-600">N<span class="text-gray-900">onAcademy</span></h1>
                <p class="text-xs uppercase text-gray-500 mt-1">YOUR CAREER BUILDING UNIVERSITY</p>
            </div>
            
            <!-- Navigation Menu -->
            <nav class="mt-6 px-4">
                <a href="#" class="flex items-center py-3 px-4 text-blue-600 font-medium rounded-lg bg-blue-50">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                    My Courses
                </a>
                <a href="#" class="flex items-center py-3 px-4 text-gray-600 hover:bg-gray-100 rounded-lg mt-2">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    Profile
                </a>
                <a href="#" class="flex items-center py-3 px-4 text-gray-600 hover:bg-gray-100 rounded-lg mt-2">
                    <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"></path>
                    </svg>
                    Rewards
                </a>
            </nav>
        </div>
        
        <!-- Main Content Area -->
        <div class="flex-1 ml-64">
            <!-- Top Header -->
            <header class="bg-white border-b border-gray-200 py-4 px-6 flex items-center justify-between">
                <div class="flex-1 text-center">
                    <span class="font-bold">Student ID: NA-93FF93</span>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- Notification Bell -->
                    <div class="relative">
                        <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                        </svg>
                        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">4</span>
                    </div>
                    
                    <!-- User Avatar -->
                    <div class="w-8 h-8 rounded-full border-2 border-blue-500 flex items-center justify-center">
                        <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                </div>
            </header>
            
            <!-- Main Content -->
            <main class="p-6 bg-gray-100 min-h-screen">
                <!-- Tabs Navigation -->
                <div class="bg-white rounded-lg shadow-sm p-1 mb-6 flex">
                    <button class="px-4 py-2 bg-blue-500 text-white rounded-md font-medium">Module</button>
                    <button class="px-4 py-2 text-gray-600 font-medium mx-1 border border-gray-200 rounded-md">Assignment</button>
                    <button class="px-4 py-2 text-gray-600 font-medium mx-1 border border-gray-200 rounded-md">Resources</button>
                    <button class="px-4 py-2 text-gray-600 font-medium mx-1 border border-gray-200 rounded-md">Leader Board</button>
                    <button class="px-4 py-2 text-gray-600 font-medium mx-1 border border-gray-200 rounded-md relative">
                        Announcements
                        <span class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">4</span>
                    </button>
                </div>
                
                <!-- Course Card -->
                <div class="bg-white rounded-lg shadow-md p-6">
                    <div class="flex flex-col md:flex-row">
                        <!-- Course Image -->
                        <div class="md:w-1/3 mb-4 md:mb-0">
                            <div class="bg-blue-900 rounded-lg h-64 flex items-center justify-center text-white text-center p-4">
                                <div>
                                    <div class="bg-gray-200 border-2 border-dashed rounded-xl w-16 h-16 mb-4 mx-auto"></div>
                                    <p>Fullstack Blockchain Development</p>
                                    <p class="text-sm mt-2">লাইভ ক্লাসের ছবি</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Course Details -->
                        <div class="md:w-2/3 md:pl-6">
                            <h2 class="text-2xl font-bold text-gray-900">Fullstack Blockchain Development Course - Live Batch</h2>
                            <p class="text-gray-500 mt-1">NonAcademy</p>
                            
                            <!-- Progress Section -->
                            <div class="mt-6">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-gray-700 font-medium">Progress</span>
                                    <span class="text-gray-700 font-medium">7%</span>
                                </div>
                                <div class="progress-bar">
                                    <div class="progress-fill"></div>
                                </div>
                            </div>
                            
                            <!-- Action Button -->
                            <div class="mt-8 flex justify-end">
                                <button class="bg-blue-500 hover:bg-blue-600 text-white font-medium py-2 px-6 rounded-md transition duration-200">
                                    Continue Course
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
