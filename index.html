<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DecentraForce — Decentralize Education. Equalize Power.</title>
<!-- Fonts loaded with crossorigin + fallback system fonts if blocked -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* Font fallbacks if Google Fonts fails (file:// or offline) */
  body { font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif; }
  .logo, h1, h2, h3, .sec-title, .db-page-title, .profile-name,
  .hstat-num, .fcn, .st-big, .ctitle, .db-ctitle, .wy-title, .rv-name,
  .sub-title, .auth-left h2, .reward-val, .sl { 
    font-family: 'Syne', 'Segoe UI', system-ui, sans-serif !important; 
  }
  :root {
    --navy:  #04091a;
    --navy2: #080f22;
    --navy3: #0b1530;
    --blue:  #1a56ff;
    --bglow: rgba(26,86,255,0.38);
    --viol:  #7c3aed;
    --vglow: rgba(124,58,237,0.3);
    --cyan:  #00e5ff;
    --gold:  #f5c542;
    --green: #22c55e;
    --white: #ffffff;
    --muted: rgba(255,255,255,0.52);
    --muted2:rgba(255,255,255,0.28);
    --card:  rgba(255,255,255,0.04);
    --cardb: rgba(255,255,255,0.08);
    --r:     20px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);overflow-x:hidden}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:16px 60px;background:rgba(4,9,26,.82);backdrop-filter:blur(22px);border-bottom:1px solid var(--cardb)}
  .logo{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;color:var(--white);text-decoration:none;display:flex;align-items:center;gap:9px}
  .logo-ico{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--viol));display:flex;align-items:center;justify-content:center;font-size:17px}
  .logo .ac{color:var(--cyan)}
  .nav-links{display:flex;gap:32px;list-style:none}
  .nav-links a{color:var(--muted);text-decoration:none;font-size:14px;font-weight:500;transition:color .2s}
  .nav-links a:hover{color:var(--white)}
  .nav-cta{display:flex;gap:10px;align-items:center}
  .btn-ghost{color:var(--white);background:transparent;border:1.5px solid var(--cardb);padding:9px 22px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;transition:border-color .2s,background .2s;font-family:'DM Sans',sans-serif}
  .btn-ghost:hover{border-color:var(--blue);background:rgba(26,86,255,.1)}
  .btn-primary{color:var(--white);background:linear-gradient(135deg,var(--blue),var(--viol));border:none;padding:10px 24px;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 0 28px var(--bglow);transition:transform .2s,box-shadow .2s;font-family:'DM Sans',sans-serif}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 40px var(--bglow)}

  /* HERO */
  .hero{position:relative;min-height:100vh;display:flex;align-items:center;padding:140px 60px 80px;overflow:hidden}
  .orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none}
  .o1{width:650px;height:650px;background:radial-gradient(circle,rgba(26,86,255,.28) 0%,transparent 70%);top:-150px;right:-120px;animation:fA 9s ease-in-out infinite}
  .o2{width:420px;height:420px;background:radial-gradient(circle,rgba(124,58,237,.2) 0%,transparent 70%);bottom:0;right:250px;animation:fB 11s ease-in-out infinite}
  .o3{width:320px;height:320px;background:radial-gradient(circle,rgba(0,229,255,.12) 0%,transparent 70%);top:250px;left:-60px;animation:fA 13s ease-in-out infinite reverse}
  @keyframes fA{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-28px) scale(1.04)}}
  @keyframes fB{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(22px) scale(.96)}}
  .hex-bg{position:absolute;inset:0;z-index:0;opacity:.06;background-image:repeating-linear-gradient(0deg,rgba(26,86,255,.15) 0px,transparent 1px,transparent 40px),repeating-linear-gradient(90deg,rgba(26,86,255,.15) 0px,transparent 1px,transparent 40px);background-size:40px 40px}
  .hero-content{position:relative;z-index:2;max-width:640px}
  .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(26,86,255,.12);border:1px solid rgba(26,86,255,.35);padding:6px 16px;border-radius:30px;font-size:13px;font-weight:500;color:var(--cyan);margin-bottom:28px;animation:fu .6s ease forwards}
  .hero-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
  .hero h1{font-family:'Syne',sans-serif;font-size:clamp(44px,5.8vw,76px);font-weight:800;line-height:1.04;letter-spacing:-2.5px;animation:fu .6s .1s ease forwards}
  .hb{background:linear-gradient(135deg,var(--blue) 0%,var(--cyan) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hv{background:linear-gradient(135deg,var(--viol) 0%,#ec4899 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero-sub{margin-top:22px;color:var(--muted);font-size:16.5px;line-height:1.75;max-width:500px;animation:fu .6s .2s ease forwards}
  .hero-actions{margin-top:38px;display:flex;gap:14px;align-items:center;animation:fu .6s .3s ease forwards}
  .btn-hero{background:linear-gradient(135deg,var(--blue),var(--viol));color:var(--white);border:none;padding:15px 34px;border-radius:50px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 0 40px var(--bglow);transition:transform .2s,box-shadow .2s}
  .btn-hero:hover{transform:translateY(-3px);box-shadow:0 10px 60px var(--bglow)}
  .btn-vid{display:flex;align-items:center;gap:10px;color:var(--white);background:transparent;border:none;font-size:15px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif}
  .play{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;transition:background .2s}
  .btn-vid:hover .play{background:rgba(255,255,255,.14)}
  .hero-stats{margin-top:60px;display:flex;gap:42px;animation:fu .6s .4s ease forwards}
  .hs{border-left:2px solid rgba(26,86,255,.5);padding-left:16px}
  .hs-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}
  .hs-num .u{color:var(--blue)}
  .hs-lbl{font-size:12px;color:var(--muted);margin-top:2px}
  /* hero visual */
  .hero-vis{position:absolute;right:60px;top:50%;transform:translateY(-50%);z-index:2;animation:fu .6s .2s ease forwards}
  .hcg{position:relative;width:380px;height:460px}
  .fcrd{position:absolute;background:rgba(255,255,255,.04);border:1px solid var(--cardb);backdrop-filter:blur(20px);border-radius:20px;padding:22px 26px}
  .fc-a{top:0;right:0;width:205px;animation:fA 6s ease-in-out infinite}
  .fc-b{bottom:50px;left:0;width:215px;animation:fB 7s ease-in-out infinite}
  .fc-c{top:155px;right:-20px;width:175px;animation:fA 9s ease-in-out infinite 1s}
  .fci{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--blue),var(--viol));display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:12px}
  .fcn{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
  .fcl{font-size:12px;color:var(--muted);margin-top:2px}
  .avr{display:flex;margin-top:10px}
  .av{width:28px;height:28px;border-radius:50%;border:2px solid var(--navy);margin-left:-8px;font-size:11px;display:flex;align-items:center;justify-content:center;font-weight:700}
  .av:first-child{margin-left:0}
  .a1{background:linear-gradient(135deg,#f5c542,#ff6b35)}
  .a2{background:linear-gradient(135deg,#1a56ff,#00e5ff)}
  .a3{background:linear-gradient(135deg,#a855f7,#ec4899)}
  .a4{background:linear-gradient(135deg,#22c55e,#16a34a)}
  .stars{color:var(--gold);font-size:15px}
  .hex-c{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:220px;height:220px;display:flex;align-items:center;justify-content:center;font-size:70px}
  .hex-c::before{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(26,86,255,.22) 0%,transparent 70%);border-radius:50%;animation:pulse 3s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 40px rgba(26,86,255,.3)}50%{box-shadow:0 0 80px rgba(26,86,255,.55)}}
  @keyframes fu{from{opacity:.4;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  /* MARQUEE */
  .mq-wrap{overflow:hidden;border-top:1px solid var(--cardb);border-bottom:1px solid var(--cardb);padding:26px 0}
  .mq-track{display:flex;gap:56px;width:max-content;animation:mq 22s linear infinite}
  .mq-item{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600;color:var(--muted);white-space:nowrap}
  .mdot{width:5px;height:5px;border-radius:50%;background:var(--blue);flex-shrink:0}
  @keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* SECTION UTILS */
  section{padding:96px 60px;position:relative;z-index:1}
  .pill{display:inline-block;background:rgba(26,86,255,.1);border:1px solid rgba(26,86,255,.28);border-radius:30px;padding:5px 16px;font-size:13px;color:var(--blue);font-weight:500;margin-bottom:14px}
  .sec-title{font-family:'Syne',sans-serif;font-size:clamp(30px,4vw,46px);font-weight:800;letter-spacing:-1px;line-height:1.1}
  .sec-sub{color:var(--muted);font-size:15.5px;line-height:1.72;max-width:520px;margin-top:12px}
  .sec-hdr{text-align:center;margin-bottom:56px}
  /* REVEAL — always visible. JS adds .animated for the nice fade, but content shows regardless */
  .reveal{opacity:1;transform:none}
  .reveal.animated{animation:sectionIn .7s ease both}
  @keyframes sectionIn{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}

  /* COURSES */
  .crs-sec{background:var(--navy2)}
  .c-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:42px;justify-content:center}
  .tab{padding:9px 22px;border-radius:50px;cursor:pointer;font-size:13.5px;font-weight:500;border:1.5px solid var(--cardb);color:var(--muted);background:transparent;font-family:'DM Sans',sans-serif;transition:all .2s}
  .tab.active{background:linear-gradient(135deg,var(--blue),var(--viol));border-color:transparent;color:var(--white);box-shadow:0 0 24px var(--bglow)}
  .tab:hover:not(.active){border-color:var(--blue);color:var(--white)}
  .crs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .ccard{background:var(--card);border:1px solid var(--cardb);border-radius:var(--r);overflow:hidden;transition:transform .25s,border-color .25s,box-shadow .25s;cursor:pointer;display:flex;flex-direction:column}
  .ccard.hidden{display:none}
  .ccard:hover{transform:translateY(-6px);border-color:rgba(26,86,255,.45);box-shadow:0 20px 60px rgba(0,0,0,.45),0 0 0 1px rgba(26,86,255,.18)}
  .cthumb{height:190px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:52px}
  .th-ai   {background:linear-gradient(135deg,#0a0020,#5b21b6,#1a56ff)}
  .th-blk  {background:linear-gradient(135deg,#0d1b6e,#1a56ff,#00e5ff)}
  .th-web  {background:linear-gradient(135deg,#0f3800,#15803d,#84cc16)}
  .th-ds   {background:linear-gradient(135deg,#1a0537,#7c3aed,#ec4899)}
  .th-nano {background:linear-gradient(135deg,#001f3f,#0ea5e9,#38bdf8)}
  .th-fin  {background:linear-gradient(135deg,#1a0a00,#c05621,#f5c542)}
  .th-defi {background:linear-gradient(135deg,#00200a,#065f46,#22c55e)}
  .cbadge{position:absolute;top:13px;right:13px;font-size:10.5px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
  .live{background:#ef4444;color:#fff;box-shadow:0 0 14px rgba(239,68,68,.6);animation:blink 2s ease-in-out infinite}
  .fin {background:rgba(255,255,255,.15);color:rgba(255,255,255,.7)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.7}}
  .cbody{padding:22px;flex:1;display:flex;flex-direction:column}
  .ccat{font-size:11px;font-weight:700;color:var(--blue);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
  .ctitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;line-height:1.4;margin-bottom:14px;flex:1}
  .cmeta{display:flex;gap:14px;color:var(--muted);font-size:12.5px;flex-wrap:wrap}
  .cmeta span{display:flex;align-items:center;gap:4px}
  .cfoot{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;border-top:1px solid var(--cardb)}
  .cprice{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:var(--gold)}
  .closed-lbl{color:var(--muted);font-size:14px;font-weight:500}
  .btn-enroll{background:rgba(26,86,255,.14);color:var(--blue);border:1px solid rgba(26,86,255,.3);padding:8px 18px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s,color .2s}
  .btn-enroll:hover{background:var(--blue);color:var(--white)}
  .btn-enroll:disabled{opacity:.45;cursor:not-allowed}
  .see-all-crd{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;min-height:280px;text-align:center}

  /* STATS */
  .st-sec{background:var(--navy)}
  .st-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
  .st-card{background:var(--card);border:1px solid var(--cardb);border-radius:var(--r);padding:38px 28px;text-align:center;position:relative;overflow:hidden;transition:border-color .25s,box-shadow .25s}
  .st-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(26,86,255,.06) 0%,transparent 60%);pointer-events:none}
  .st-card:hover{border-color:rgba(26,86,255,.4);box-shadow:0 0 40px rgba(26,86,255,.1)}
  .st-ico{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,rgba(26,86,255,.18),rgba(124,58,237,.12));border:1px solid rgba(26,86,255,.25);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 18px}
  .st-big{font-family:'Syne',sans-serif;font-size:44px;font-weight:800;background:linear-gradient(135deg,var(--white) 0%,rgba(255,255,255,.65) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .st-big .ac{background:linear-gradient(135deg,var(--blue),var(--cyan));-webkit-background-clip:text;background-clip:text}
  .st-dsc{color:var(--muted);font-size:13.5px;margin-top:6px}

  /* WHY */
  .wy-sec{background:var(--navy2)}
  .wy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .wy-card{background:var(--card);border:1px solid var(--cardb);border-radius:var(--r);padding:34px 30px;transition:border-color .25s,box-shadow .25s}
  .wy-card:hover{border-color:rgba(26,86,255,.32);box-shadow:0 0 40px rgba(26,86,255,.07)}
  .wy-ico{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,rgba(26,86,255,.18),rgba(124,58,237,.1));display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:18px}
  .wy-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:10px}
  .wy-desc{color:var(--muted);font-size:13.5px;line-height:1.72}

  /* TESTIMONIALS */
  .ts-sec{background:var(--navy)}
  .rv-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  .rv-card{background:var(--card);border:1px solid var(--cardb);border-radius:var(--r);padding:28px;transition:border-color .25s,transform .25s;display:flex;flex-direction:column;gap:18px}
  .rv-card:hover{border-color:rgba(26,86,255,.3);transform:translateY(-4px)}
  .rv-card.feat{background:linear-gradient(135deg,rgba(26,86,255,.13),rgba(124,58,237,.07));border-color:rgba(26,86,255,.38)}
  .rv-top{display:flex;justify-content:space-between;align-items:flex-start}
  .qi{font-size:30px;color:var(--blue);line-height:1;font-family:Georgia,serif}
  .rv-stars{color:var(--gold);font-size:14px}
  .rv-text{font-size:14.5px;line-height:1.75;color:rgba(255,255,255,.83);flex:1}
  .rv-lang{font-size:11px;color:var(--muted2);font-style:italic}
  .reviewer{display:flex;align-items:center;gap:12px}
  .rv-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0}
  .rv-name{font-weight:600;font-size:14px}
  .rv-id{font-size:12px;color:var(--muted);margin-top:2px}

  /* AUTH */
  .auth-sec{padding:96px 60px;display:flex;align-items:center;justify-content:center}
  .auth-wrap{background:var(--navy2);border:1px solid var(--cardb);border-radius:32px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;max-width:900px;width:100%;box-shadow:0 40px 120px rgba(0,0,0,.55)}
  .auth-left{background:linear-gradient(160deg,#0e1f60,#06103a,#04091a);padding:56px 48px;position:relative;overflow:hidden}
  .auth-left::before{content:'';position:absolute;top:-80px;left:-80px;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(26,86,255,.28),transparent 70%)}
  .al-inner{position:relative;z-index:2}
  .al-inner h2{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1.3;margin-bottom:10px}
  .al-inner p{color:var(--muted);font-size:14px;line-height:1.7}
  .a-steps{margin-top:40px;display:flex;flex-direction:column;gap:26px}
  .a-step{display:flex;gap:16px;align-items:flex-start}
  .sn{width:34px;height:34px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--blue),var(--viol));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:15px;font-weight:800}
  .sl{font-size:17px;font-weight:700;color:var(--cyan);font-family:'Syne',sans-serif}
  .sd{font-size:13px;color:var(--muted);margin-top:4px}
  .auth-right{padding:52px 48px}
  .a-tabs{display:flex;gap:4px;background:rgba(255,255,255,.04);border-radius:12px;padding:4px;margin-bottom:28px}
  .a-tab{flex:1;padding:9px 0;text-align:center;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--muted);border:none;background:transparent;font-family:'DM Sans',sans-serif;transition:all .2s}
  .a-tab.active{background:var(--blue);color:var(--white);box-shadow:0 0 18px var(--bglow)}
  .a-panel{display:none}
  .a-panel.active{display:block}
  .flbl{font-size:13px;font-weight:500;color:var(--muted);margin-bottom:7px;display:block}
  .frow{margin-bottom:16px}
  .fi{width:100%;background:rgba(255,255,255,.05);border:1.5px solid var(--cardb);border-radius:12px;padding:12px 16px;color:var(--white);font-size:15px;font-family:'DM Sans',sans-serif;transition:border-color .2s,box-shadow .2s;outline:none}
  .fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,255,.14)}
  .fi::placeholder{color:rgba(255,255,255,.22)}
  .fi.err{border-color:#ef4444}
  .ferr{font-size:12px;color:#ef4444;margin-top:5px;display:none}
  .ferr.show{display:block}
  .iw{position:relative}
  .ptog{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:0}
  .btn-auth{width:100%;background:linear-gradient(135deg,var(--blue),var(--viol));color:var(--white);border:none;padding:13px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 0 28px var(--bglow);transition:transform .2s,box-shadow .2s;margin-top:4px}
  .btn-auth:hover{transform:translateY(-2px);box-shadow:0 10px 46px var(--bglow)}
  .a-footer{text-align:center;font-size:13px;color:var(--muted);margin-top:16px}
  .a-footer a{color:var(--blue);text-decoration:none;cursor:pointer}
  .a-footer a:hover{text-decoration:underline}
  .alert{border-radius:12px;padding:14px 16px;font-size:13.5px;line-height:1.65;margin-bottom:16px;display:none}
  .alert.show{display:block}
  .a-info{background:rgba(26,86,255,.12);border:1px solid rgba(26,86,255,.3);color:var(--cyan)}

<script>
/* ═══════════════════════════════════════════════
   EMAILJS CONFIG  ← fill in your 3 values below
   Sign up free at https://emailjs.com
   → Add Service (Gmail) → copy Service ID
   → Add Template      → copy Template ID
   → Account > API Keys→ copy Public Key
   Template must have variables:
     {{to_email}}  {{subject}}  {{message}}
═══════════════════════════════════════════════ */
const EJS_PUBLIC_KEY  = 'TxlilKkHJZDum1C5v';   // ← paste from EmailJS Account > API Keys
const EJS_SERVICE_ID  = 'service_wn7dn1f';   // ✅ your Gmail service
const EJS_TEMPLATE_ID = 'template_2067o6n';

try { if(typeof emailjs!=='undefined') emailjs.init({ publicKey: EJS_PUBLIC_KEY }); } catch(e){}

/* ── SCROLL REVEAL — content always visible, animation is cosmetic only ── */
function initReveal() {
  if (!('IntersectionObserver' in window)) return;
  const ro = new IntersectionObserver(
    e => e.forEach(x => {
      if (x.isIntersecting) {
        x.target.classList.add('animated');
        ro.unobserve(x.target);
      }
    }),
    { threshold: 0.05 }
  );
  document.querySelectorAll('.reveal').forEach(el => ro.observe(el));
}
initReveal();

/* ── COURSE TABS ── */
document.querySelectorAll('.tab[data-filter]').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab[data-filter]').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const f = tab.dataset.filter;
    document.querySelectorAll('.ccard').forEach(c => {
      if (c.classList.contains('see-all-crd')) { c.classList.remove('hidden'); return; }
      c.classList.toggle('hidden', f !== 'all' && c.dataset.cat !== f);
    });
  });
});

/* ── AUTH PANELS ── */
function showPanel(p) {
  document.querySelectorAll('.a-panel').forEach(x => x.classList.remove('active'));
  document.getElementById('panel-' + p).classList.add('active');
  document.getElementById('auth').scrollIntoView({ behavior: 'smooth' });
}
function switchTab(t) {
  document.getElementById('tab-login').classList.toggle('active', t === 'login');
  document.getElementById('tab-register').classList.toggle('active', t === 'register');
  showPanel(t);
}
function openAuth(t) { switchTab(t); }

/* ── FIELD HELPERS ── */
const isEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
function sErr(id, msg) { const e = document.getElementById(id); if (msg) e.textContent = msg; e.classList.add('show'); }
function cErr(id) { document.getElementById(id).classList.remove('show'); }
function sInv(id) { document.getElementById(id).classList.add('err'); }
function cInv(id) { document.getElementById(id).classList.remove('err'); }
function tPwd(id, btn) {
  const i = document.getElementById(id);
  i.type = i.type === 'password' ? 'text' : 'password';
  btn.textContent = i.type === 'password' ? '👁' : '🙈';
}
function checkStr(v, fillId, txtId) {
  let s = 0;
  if (v.length >= 8) s++; if (/[A-Z]/.test(v)) s++;
  if (/[0-9]/.test(v)) s++; if (/[^A-Za-z0-9]/.test(v)) s++;
  const cols = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
  const lbls = ['Weak', 'Fair', 'Good', 'Strong'];
  const f = document.getElementById(fillId);
  if (f) { f.style.width = (s / 4 * 100) + '%'; f.style.background = v ? (cols[s - 1] || '#ef4444') : 'transparent'; }
  const t = document.getElementById(txtId);
  if (t) t.textContent = v ? (lbls[s - 1] || 'Weak') : 'Enter a password';
}
function getOtp(rowId) {
  return Array.from(document.getElementById(rowId).querySelectorAll('.otp-b')).map(b => b.value).join('');
}
function genOtp() { return String(Math.floor(100000 + Math.random() * 900000)); }
function setBtnLoading(btnId, loading, label) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.textContent = loading ? 'Sending…' : label;
  btn.style.opacity = loading ? '0.7' : '1';
}

/* ── COUNTDOWN TIMER ── */
function startTimer(spanId, linkId, secs) {
  const span = document.getElementById(spanId), link = document.getElementById(linkId);
  link.style.pointerEvents = 'none'; link.style.opacity = '.4';
  let s = secs; span.textContent = `(${s}s)`;
  const iv = setInterval(() => {
    s--; span.textContent = s > 0 ? `(${s}s)` : '';
    if (s <= 0) { clearInterval(iv); link.style.pointerEvents = 'auto'; link.style.opacity = '1'; }
  }, 1000);
}

/* ── OTP FOCUS NAVIGATION ── */
document.querySelectorAll('.otp-row').forEach(row => {
  row.querySelectorAll('.otp-b').forEach((box, i, all) => {
    box.addEventListener('input', () => { if (box.value && all[i + 1]) all[i + 1].focus(); });
    box.addEventListener('keydown', e => { if (e.key === 'Backspace' && !box.value && all[i - 1]) all[i - 1].focus(); });
    box.addEventListener('paste', e => {
      e.preventDefault();
      const p = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '').slice(0, 6);
      p.split('').forEach((ch, j) => { if (all[j]) all[j].value = ch; });
      const last = all[Math.min(p.length, 5)]; if (last) last.focus();
    });
  });
});

/* ── SEND EMAIL via EmailJS ── */
async function sendEmail(to, subject, message) {
  if (typeof emailjs === 'undefined') {
    throw new Error('Email service not available. Please check your internet connection.');
  }
  await emailjs.send(EJS_SERVICE_ID, EJS_TEMPLATE_ID, {
    to_email: to,
    subject:  subject,
    message:  message
  });
}

/* ── ACCOUNT STORE (localStorage) ── */
function getAccounts() {
  try { return JSON.parse(localStorage.getItem('df_accounts') || '{}'); } catch(e) { return {}; }
}
function saveAccount(email, name, passHash) {
  const accounts = getAccounts();
  accounts[email.toLowerCase()] = { name, pass: passHash };
  localStorage.setItem('df_accounts', JSON.stringify(accounts));
}
function findAccount(email) {
  return getAccounts()[email.toLowerCase()] || null;
}
/* Simple repeatable hash — not cryptographic, fine for a frontend demo */
function hashPass(pass) {
  let h = 0;
  for (let i = 0; i < pass.length; i++) {
    h = Math.imul(31, h) + pass.charCodeAt(i) | 0;
  }
  return h.toString(36);
}

/* OTP store in sessionStorage so it survives accidental scroll/render but stays per-tab */
function setOtp(key, val) { sessionStorage.setItem('df_otp_' + key, val); }
function getOtpStored(key) { return sessionStorage.getItem('df_otp_' + key) || ''; }
function clearOtp(key) { sessionStorage.removeItem('df_otp_' + key); }

/* ════════════════════════════
   LOGIN — checks localStorage accounts
════════════════════════════ */
function doLogin() {
  const email = document.getElementById('lg-email').value.trim();
  const pass  = document.getElementById('lg-pass').value;
  let ok = true;
  ['lg-email-e', 'lg-pass-e'].forEach(cErr);
  ['lg-email', 'lg-pass'].forEach(cInv);
  document.getElementById('lg-err').classList.remove('show');
  if (!isEmail(email)) { sErr('lg-email-e'); sInv('lg-email'); ok = false; }
  if (!pass)           { sErr('lg-pass-e');  sInv('lg-pass');  ok = false; }
  if (!ok) return;

  const account = findAccount(email);
  if (!account || account.pass !== hashPass(pass)) {
    document.getElementById('lg-err').classList.add('show');
    return;
  }
  /* ✅ Login success — open dashboard */
  document.getElementById('lg-err').classList.remove('show');
  showLoginSuccess(account.name, email);
}

/* ── SESSION CHECK ── */
function isLoggedIn() {
  return !!sessionStorage.getItem('df_current_user');
}
function getCurrentUser() {
  try { return JSON.parse(sessionStorage.getItem('df_current_user')); } catch(e) { return null; }
}

/* Generate a student ID from email */
function makeStudentId(email) {
  let h = 0;
  for (let i = 0; i < email.length; i++) h = Math.imul(31, h) + email.charCodeAt(i) | 0;
  return 'DF-' + Math.abs(h).toString(16).toUpperCase().slice(0, 6).padStart(6,'0');
}

function showLoginSuccess(name, email) {
  const sid = makeStudentId(email);
  sessionStorage.setItem('df_current_user', JSON.stringify({ name, email, sid }));
  setNavLoggedIn(name);
  openDashboard('mycourses');
}

function setNavLoggedIn(name) {
  document.getElementById('nav-cta-guest').style.display = 'none';
  const userNav = document.getElementById('nav-cta-user');
  userNav.classList.add('show');
  document.getElementById('nav-user-name').textContent = name;
  document.getElementById('nav-av-letter').textContent = name.charAt(0).toUpperCase();
}

function openDashboard(page) {
  const user = getCurrentUser();
  if (!user) { openAuth('login'); return; }
  // Populate profile data
  document.getElementById('db-student-id').textContent = user.sid;
  document.getElementById('db-av-letter').textContent   = user.name.charAt(0).toUpperCase();
  document.getElementById('pf-av-letter').textContent   = user.name.charAt(0).toUpperCase();
  document.getElementById('pf-name').textContent        = user.name;
  document.getElementById('pf-email').textContent       = user.email;
  document.getElementById('pf-sid').textContent         = user.sid;
  document.getElementById('pf-since').textContent       = new Date().getFullYear();
  document.getElementById('dashboard').classList.add('open');
  document.body.style.overflow = 'hidden';
  dbNav(page || 'mycourses');
}

function closeDashboard() {
  document.getElementById('dashboard').classList.remove('open');
  document.body.style.overflow = '';
}

function dbNav(page) {
  // Sidebar active state
  ['mycourses','profile','rewards'].forEach(p => {
    const sb = document.getElementById('sb-' + p);
    if (sb) sb.classList.toggle('active', p === page);
    const pg = document.getElementById('page-' + p);
    if (pg) pg.classList.toggle('active', p === page);
  });
}

function switchDbTab(btn, tab) {
  document.querySelectorAll('.db-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  ['ongoing','subscription','free'].forEach(t => {
    const el = document.getElementById('dtab-' + t);
    if (el) el.style.display = t === tab ? 'block' : 'none';
  });
}

function handleGetStarted() {
  if (isLoggedIn()) openDashboard('mycourses');
  else openAuth('register');
}

function handleCoursesClick(e) {
  e.preventDefault();
  if (isLoggedIn()) openDashboard('mycourses');
  else document.getElementById('courses').scrollIntoView({ behavior: 'smooth' });
}

function doLogout() {
  sessionStorage.removeItem('df_current_user');
  closeDashboard();
  document.getElementById('nav-cta-guest').style.display = '';
  document.getElementById('nav-cta-user').classList.remove('show');
}

/* Check on page load if already logged in (session persists on same tab) */
window.addEventListener('DOMContentLoaded', () => {
  const user = getCurrentUser();
  if (user) setNavLoggedIn(user.name);
});

/* ════════════════════════════
   REGISTER — saves to localStorage
════════════════════════════ */
function doRegister() {
  const name   = document.getElementById('rg-name').value.trim();
  const email  = document.getElementById('rg-email').value.trim();
  const cemail = document.getElementById('rg-cemail').value.trim();
  const pass   = document.getElementById('rg-pass').value;
  const cpass  = document.getElementById('rg-cpass').value;
  let ok = true;
  ['rg-name-e','rg-email-e','rg-cemail-e','rg-pass-e','rg-cpass-e'].forEach(cErr);
  ['rg-name','rg-email','rg-cemail','rg-pass','rg-cpass'].forEach(cInv);
  if (!name)              { sErr('rg-name-e',  'Please enter your name.');          sInv('rg-name');   ok = false; }
  if (!isEmail(email))    { sErr('rg-email-e', 'Please enter a valid email.');       sInv('rg-email');  ok = false; }
  if (isEmail(email) && email.toLowerCase() !== cemail.toLowerCase()) {
                            sErr('rg-cemail-e','Emails do not match.');              sInv('rg-cemail'); ok = false; }
  if (pass.length < 8)    { sErr('rg-pass-e',  'Password must be at least 8 characters.'); sInv('rg-pass'); ok = false; }
  if (pass !== cpass)     { sErr('rg-cpass-e', 'Passwords do not match.');          sInv('rg-cpass');  ok = false; }
  if (!ok) return;

  /* Check email not already registered */
  if (findAccount(email)) {
    sErr('rg-email-e', 'This email is already registered. Try logging in.');
    sInv('rg-email'); return;
  }

  saveAccount(email, name, hashPass(pass));
  showLoginSuccess(name, email);
}

function rgGoBack() {
  document.getElementById('rg2').style.display = 'none';
  document.getElementById('rg1').style.display = 'block';
}

/* ════════════════════════════
   FORGOT PASSWORD — OTP via EmailJS
════════════════════════════ */
async function fpSend() {
  const email = document.getElementById('fp-email').value.trim();
  cErr('fp-email-e'); cInv('fp-email');
  if (!isEmail(email)) { sErr('fp-email-e'); sInv('fp-email'); return; }

  const btn = document.getElementById('fp-send-btn');
  btn.disabled = true; btn.textContent = 'Sending…'; btn.style.opacity = '0.7';

  const otp = genOtp();
  setOtp('fp', otp);                        /* ← sessionStorage, survives scroll */
  sessionStorage.setItem('df_fp_email', email);

  try {
    await sendEmail(
      email,
      '🔐 DecentraForce — Password Reset Code',
      `Hi,\n\nYour password reset code is:\n\n${otp}\n\nThis code expires in 10 minutes. Do not share it with anyone.\n\nIf you did not request this, you can safely ignore this email.\n\n— The DecentraForce Team 🇧🇩`
    );
    document.getElementById('fp-to').textContent = email;
    document.getElementById('fp1').style.display = 'none';
    document.getElementById('fp2').style.display = 'block';
    startTimer('fp-timer', 'fp-resend-a', 60);
  } catch (err) {
    console.error('EmailJS error:', err);
    sErr('fp-email-e', 'Failed to send code. Check your connection and try again.');
    sInv('fp-email');
  } finally {
    btn.disabled = false; btn.textContent = 'Send Reset Code →'; btn.style.opacity = '1';
  }
}

async function fpResend() {
  const email = sessionStorage.getItem('df_fp_email');
  if (!email) return;
  const otp = genOtp();
  setOtp('fp', otp);
  startTimer('fp-timer', 'fp-resend-a', 60);
  try {
    await sendEmail(
      email,
      '🔐 DecentraForce — New Reset Code',
      `Hi,\n\nYour new password reset code is:\n\n${otp}\n\nThis code expires in 10 minutes.\n\n— The DecentraForce Team 🇧🇩`
    );
  } catch (e) { console.error('Resend failed', e); }
}

function fpGoBack() {
  document.getElementById('fp2').style.display = 'none';
  document.getElementById('fp1').style.display = 'block';
}

function fpVerify() {
  const code    = getOtp('fp-otp-row');
  const stored  = getOtpStored('fp');
  const eEl     = document.getElementById('fp-otp-e');
  eEl.style.display = 'none';
  if (code.length < 6) {
    eEl.textContent = 'Please enter the full 6-digit code.'; eEl.style.display = 'block'; return;
  }
  if (code.trim() !== stored.trim()) {
    eEl.textContent = 'Incorrect code. Please check your email and try again.'; eEl.style.display = 'block'; return;
  }
  clearOtp('fp');
  document.getElementById('fp2').style.display = 'none';
  document.getElementById('fp3').style.display = 'block';
}

function fpReset() {
  const np    = document.getElementById('fp-np').value;
  const cp    = document.getElementById('fp-cp').value;
  const email = sessionStorage.getItem('df_fp_email') || '';
  cErr('fp-cp-e'); cInv('fp-cp');
  if (np.length < 8) { alert('Password must be at least 8 characters.'); return; }
  if (np !== cp)     { sErr('fp-cp-e'); sInv('fp-cp'); return; }

  /* Update stored password */
  if (email) {
    const accounts = getAccounts();
    const key = email.toLowerCase();
    if (accounts[key]) {
      accounts[key].pass = hashPass(np);
      localStorage.setItem('df_accounts', JSON.stringify(accounts));
    }
  }
  sessionStorage.removeItem('df_fp_email');
  document.getElementById('fp3').style.display = 'none';
  document.getElementById('fp4').style.display = 'block';
}
