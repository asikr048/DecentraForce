<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Course Details — DecentraForce</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/global.css"> <style>
    /* Add basic styling to match your theme */
    body { background: #050a18; color: #e8eeff; font-family: 'DM Sans', sans-serif; }
    .details-container { max-width: 800px; margin: 120px auto 60px; padding: 40px; background: #0d1630; border: 1px solid rgba(0, 229, 255, 0.12); border-radius: 20px; box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
    .details-title { font-family: 'Syne', sans-serif; font-size: 2.5rem; color: #00e5ff; margin-bottom: 20px; }
    .details-desc { font-size: 1.1rem; color: #7d8fb3; line-height: 1.8; margin-bottom: 40px; }
    .details-price { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 20px; }
    .btn-purchase { background: linear-gradient(135deg, #7b5cff, #00e5ff); color: #fff; padding: 15px 30px; font-size: 1.1rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    
    /* Paste the modal CSS from index.html here exactly as it is */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #0d1630; border: 1px solid rgba(0, 229, 255, 0.12); border-radius: 20px; width: 100%; max-width: 440px; max-height: 90vh; display: flex; flex-direction: column; }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid rgba(0, 229, 255, 0.12); display: flex; align-items: center; justify-content: space-between; }
    .modal-close { width: 32px; height: 32px; border-radius: 8px; background: #111d3a; border: 1px solid rgba(0, 229, 255, 0.12); display: grid; place-items: center; cursor: pointer; color: #7d8fb3; transition: all 0.2s; }
    .modal-body { padding: 24px; overflow-y: auto; flex: 1; }
    .modal-actions { display: flex; gap: 12px; margin-top: 10px; }
    .btn { padding: 12px; font-weight: 600; cursor: pointer; border-radius: 8px; border: none; }
    .btn-ghost { background: transparent; color: #7d8fb3; }
    .btn-success { background: linear-gradient(135deg, #00e599, #00e5ff); color: #111; flex: 1; }
    .feedback-input { width: 100%; padding: 12px; margin-bottom: 16px; background: #111d3a; border: 1px solid rgba(0, 229, 255, 0.12); color: white; border-radius: 8px; }
  </style>
</head>
<body>

  <div class="details-container" id="courseDetailsBlock">
    <h1 class="details-title">Loading Course...</h1>
    <div class="details-desc">Please wait while we fetch the course details.</div>
  </div>

  <div class="modal-overlay" id="checkoutModal">
    <div class="modal">
      <div class="modal-header">
        <h3 style="margin:0; font-family:'Syne',sans-serif;">Complete Purchase</h3>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <h4 id="modalCourseTitle" style="font-family:'Syne',sans-serif; margin-bottom:4px;"></h4>
        <p id="modalCourseDesc" style="color:#7d8fb3; font-size:0.85rem; margin-bottom:16px;"></p>
        
        <div style="background: rgba(0,229,255,0.05); padding: 12px 16px; border-radius: 12px; display: flex; justify-content: space-between; margin-bottom: 16px;">
          <span>Total Price:</span>
          <span id="modalCoursePrice" style="color:#00e5ff; font-weight:bold; font-size:1.4rem;"></span>
        </div>

        <div id="paymentInstructionsPanel" style="background: rgba(123,92,255,0.08); padding: 16px; border-radius: 12px; margin-bottom: 24px; text-align: center;">
          <p><strong>Send Money to : 01302201431</strong></p>
          <button id="sentMoneyBtn" class="btn btn-purchase" style="width: 100%;">I have sent the money</button>
        </div>

        <div id="paymentDetailsForm" style="display: none;">
          <select id="paymentMethod" class="feedback-input">
            <option value="">Select method...</option>
            <option value="bkash">bKash</option>
            <option value="nagad">Nagad</option>
            <option value="rocket">Rocket</option>
            <option value="upay">Upay</option>
          </select>
          <input type="text" id="senderNumber" class="feedback-input" placeholder="Sender Number (01XXXXXXXXX)">
          <input type="text" id="transactionId" class="feedback-input" placeholder="Transaction ID (TrxID)">
        </div>

        <div class="modal-actions" id="modalActionButtons" style="display: none;">
          <button class="btn btn-ghost" id="modalCancel2">Cancel</button>
          <button class="btn btn-success" id="modalConfirm">Submit Payment</button>
        </div>
      </div>
    </div>
  </div>

<script>
  let activeCourse = null;

  document.addEventListener('DOMContentLoaded', async () => {
    // 1. Get Course ID from URL (e.g., course-details.html?id=5)
    const urlParams = new URLSearchParams(window.location.search);
    const courseId = urlParams.get('id');

    if (!courseId) {
      document.getElementById('courseDetailsBlock').innerHTML = '<h2>Course not found. Please go back.</h2>';
      return;
    }

    // 2. Fetch all courses and find the specific one
    try {
      const res = await fetch('/api/_public/courses');
      const data = await res.json();
      
      activeCourse = data.courses.find(c => c.id == courseId);

      if (!activeCourse) {
        document.getElementById('courseDetailsBlock').innerHTML = '<h2>Course not found or is inactive.</h2>';
        return;
      }

      // 3. Render Details on the Page
      const priceVal = parseFloat(activeCourse.price) || 0;
      const priceText = priceVal === 0 ? 'Free' : `৳${priceVal}`;

      document.getElementById('courseDetailsBlock').innerHTML = `
        <h1 class="details-title">${activeCourse.title}</h1>
        <div class="details-price">${priceText}</div>
        <div class="details-desc">${activeCourse.description}</div>
        <button class="btn-purchase" id="pagePurchaseBtn">${priceVal === 0 ? 'Enroll for Free' : 'Purchase Course'}</button>
      `;

      // 4. Attach Event Listener to "Purchase" button to trigger Modal
      document.getElementById('pagePurchaseBtn').addEventListener('click', () => {
        if (priceVal === 0) {
           // Direct to free course logic
           window.location.href = 'my-courses.html?tab=free';
        } else {
           openCheckoutModal(activeCourse, priceVal);
        }
      });

    } catch (err) {
      console.error(err);
      document.getElementById('courseDetailsBlock').innerHTML = '<h2>Failed to load course details.</h2>';
    }
  });

  // Modal logic (Exact functionality from index.html)
  function openCheckoutModal(course, price) {
    document.getElementById('modalCourseTitle').textContent = course.title;
    document.getElementById('modalCourseDesc').textContent = course.description;
    document.getElementById('modalCoursePrice').textContent = `৳${price}`;
    
    document.getElementById('paymentInstructionsPanel').style.display = 'block';
    document.getElementById('paymentDetailsForm').style.display = 'none';
    document.getElementById('modalActionButtons').style.display = 'none';

    document.getElementById('checkoutModal').classList.add('open');
  }

  function closeCheckoutModal() {
    document.getElementById('checkoutModal').classList.remove('open');
  }

  document.getElementById('modalClose').addEventListener('click', closeCheckoutModal);
  document.getElementById('modalCancel2').addEventListener('click', closeCheckoutModal);

  document.getElementById('sentMoneyBtn').addEventListener('click', () => {
    document.getElementById('paymentInstructionsPanel').style.display = 'none'; 
    document.getElementById('paymentDetailsForm').style.display = 'block';
    document.getElementById('modalActionButtons').style.display = 'flex';
  });

  document.getElementById('modalConfirm').addEventListener('click', (e) => {
    e.preventDefault();
    const btn = e.target;
    const paymentMethod = document.getElementById('paymentMethod').value;
    const senderNumber = document.getElementById('senderNumber').value.trim();
    const transactionId = document.getElementById('transactionId').value.trim();
    
    if (!paymentMethod || !senderNumber || !transactionId) {
      alert('Please fill out all fields.'); return;
    }

    btn.textContent = 'Processing...';
    btn.disabled = true;

    fetch('/api/purchases', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        course_id: activeCourse.id,
        sender_number: senderNumber,
        transaction_id: transactionId,
        payment_method: paymentMethod
      })
    })
    .then(res => res.json())
    .then(data => {
      if (data.success) {
        closeCheckoutModal();
        alert('Payment submitted successfully!');
        window.location.href = 'my-courses.html';
      } else {
        alert('Error: ' + data.error);
        btn.textContent = 'Submit Payment';
        btn.disabled = false;
      }
    });
  });
</script>
</body>
</html>
