<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — DecentraForce</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230d1630'/><rect width='100' height='100' rx='20' fill='url(%23g)' opacity='0.2'/><defs><linearGradient id='g' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%237b5cff'/><stop offset='100%' stop-color='%2300e5ff'/></linearGradient></defs><text x='50' y='68' font-family='Arial, sans-serif' font-size='54' font-weight='900' fill='%2300e5ff' text-anchor='middle'>DF</text></svg>">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          bg: '#050a18', surface: '#0d1630', surface2: '#111d3a',
          accent: '#00e5ff', accent2: '#7b5cff', accent3: '#ff4d8d',
          text: '#e8eeff', muted: '#7d8fb3', border: 'rgba(0, 229, 255, 0.12)', gold: '#d4af37',
        }
      }
    }
  }
</script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background-color: #050a18; color: #e8eeff; overflow-x: hidden; }
  .tab-btn { transition: all .2s; border-left: 3px solid transparent; }
  .tab-btn.active { background: rgba(0, 229, 255, 0.08); color: #00e5ff; border-left: 3px solid #00e5ff; }
  .tab-btn:hover:not(.active) { background: #111d3a; color: #fff; }
  .admin-input { width: 100%; padding: 12px 16px; background: #050a18; border: 1px solid rgba(0, 229, 255, 0.12); border-radius: 8px; color: #e8eeff; font-size: 0.95rem; outline: none; transition: border-color .2s; }
  .admin-input:focus { border-color: #d4af37; box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1); }
  .admin-input::placeholder { color: #7d8fb3; opacity: 0.6; }
  .btn-gold { background: linear-gradient(180deg, #f3e5ab 0%, #d4af37 100%); color: #050a18; font-weight: 700; transition: all 0.2s; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2); }
  .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.3); }
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter: blur(4px); z-index:50; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .toast { position:fixed; bottom:24px; right:24px; padding:14px 24px; border-radius:8px; font-weight:600; z-index:200; opacity:0; transform:translateY(10px); transition:all .3s; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.success { background:#00e599; color:#050a18; }
  .toast.error   { background:#ff4d8d; color:#fff; }
  .badge { display:inline-block; padding:4px 10px; border-radius:9999px; font-size:.75rem; font-weight:600; }
  .badge-green { background:rgba(0, 229, 153, 0.15); color:#00e599; border: 1px solid rgba(0, 229, 153, 0.3); }
  .badge-gray  { background:rgba(125, 143, 179, 0.1); color:#7d8fb3; border: 1px solid rgba(125, 143, 179, 0.3); }
  .badge-blue  { background:rgba(0, 229, 255, 0.15); color:#00e5ff; border: 1px solid rgba(0, 229, 255, 0.3); }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #050a18; }
  ::-webkit-scrollbar-thumb { background: #111d3a; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #7d8fb3; }
</style>
</head>
<body>

<div class="flex min-h-screen">
  <aside class="w-64 bg-surface border-r border-border fixed h-full flex flex-col z-20">
    <div class="p-6 border-b border-border">
      <a href="index.html" class="flex items-center gap-3 decoration-none">
        <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-accent2 to-accent flex items-center justify-center text-white font-bold text-sm shadow-[0_0_15px_rgba(123,92,255,0.5)]">DF</div>
        <div>
          <p class="font-bold text-white leading-tight tracking-wide" style="font-family: 'Syne', sans-serif;">Decentra<span class="text-accent">Force</span></p>
        </div>
      </a>
    </div>

    <nav class="flex-1 py-6 space-y-2">
      <button onclick="showTab('overview')" class="tab-btn active w-full text-left flex items-center gap-4 px-6 py-3 text-muted font-medium" data-tab="overview">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        DASHBOARD
      </button>
      <button onclick="showTab('courses')" class="tab-btn w-full text-left flex items-center gap-4 px-6 py-3 text-muted font-medium" data-tab="courses">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        MANAGE COURSES
      </button>
      <button onclick="showTab('users')" class="tab-btn w-full text-left flex items-center gap-4 px-6 py-3 text-muted font-medium" data-tab="users">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        USERS
      </button>
      <button onclick="showTab('coupons')" class="tab-btn w-full text-left flex items-center gap-4 px-6 py-3 text-muted font-medium" data-tab="coupons">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
        COUPONS
      </button>
      <button onclick="openAddCourse()" class="tab-btn w-full text-left flex items-center gap-4 px-6 py-3 text-muted font-medium" data-tab="add-course">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
        ADD NEW COURSE
      </button>
    </nav>
  </aside>

  <main class="ml-64 flex-1 flex flex-col h-screen overflow-y-auto bg-bg">
    <header class="flex justify-end items-center px-8 py-5 border-b border-border bg-surface sticky top-0 z-10">
      <div class="flex items-center gap-6">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-accent2 flex items-center justify-center text-white font-bold">A</div>
          <span class="text-sm font-medium text-white" id="adminEmailDisplay">admin</span>
        </div>
        <button onclick="logout()" class="flex items-center gap-2 text-muted hover:text-accent transition-colors text-sm font-medium">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Logout
        </button>
      </div>
    </header>

    <div class="p-8 max-w-6xl mx-auto w-full">

      <div id="tab-overview">
        <h1 class="text-2xl font-bold text-white mb-8" style="font-family: 'Syne', sans-serif;">Overview</h1>
        <div class="grid grid-cols-3 gap-6 mb-8">
          <div class="bg-surface rounded-xl p-6 border border-border shadow-lg">
            <p class="text-sm text-muted mb-2 font-medium">Total Users</p>
            <p class="text-4xl font-bold text-accent" id="stat-users">—</p>
          </div>
          <div class="bg-surface rounded-xl p-6 border border-border shadow-lg">
            <p class="text-sm text-muted mb-2 font-medium">Total Courses</p>
            <p class="text-4xl font-bold text-accent2" id="stat-courses">—</p>
          </div>
          <div class="bg-surface rounded-xl p-6 border border-border shadow-lg">
            <p class="text-sm text-muted mb-2 font-medium">Enrollments</p>
            <p class="text-4xl font-bold text-accent3" id="stat-enrollments">—</p>
          </div>
        </div>
      </div>

      <div id="tab-users" class="hidden">
        <div class="flex items-center justify-between mb-8">
          <h1 class="text-2xl font-bold text-white" style="font-family: 'Syne', sans-serif;">User Accounts</h1>
          <input type="text" id="userSearch" placeholder="Search users..." class="admin-input w-72" oninput="filterUsers()">
        </div>
        <div class="bg-surface rounded-xl border border-border overflow-hidden shadow-lg">
          <table class="w-full text-sm text-left">
            <thead class="bg-surface2 text-muted border-b border-border">
              <tr>
                <th class="px-6 py-4 font-semibold">User</th>
                <th class="px-6 py-4 font-semibold">Email</th>
                <th class="px-6 py-4 font-semibold">Joined</th>
                <th class="px-6 py-4 font-semibold">Courses</th>
                <th class="px-6 py-4 font-semibold">Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody" class="divide-y divide-border"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-coupons" class="hidden">
        <div class="flex items-center justify-between mb-8">
          <h1 class="text-2xl font-bold text-white" style="font-family: 'Syne', sans-serif;">Manage Coupons</h1>
        </div>
        
        <div class="bg-surface border border-border rounded-xl p-6 mb-8 shadow-lg flex gap-4 items-end">
          <div class="flex-1">
            <label class="block text-sm text-white mb-2">Coupon Code (e.g., EID50)</label>
            <input type="text" id="newCouponCode" class="admin-input uppercase" placeholder="Enter Code">
          </div>
          <div class="flex-1">
            <label class="block text-sm text-white mb-2">Discount Percentage (%)</label>
            <input type="number" id="newCouponDiscount" class="admin-input" placeholder="e.g., 50" min="1" max="100">
          </div>
          <button onclick="createCoupon()" class="bg-gradient-to-r from-accent2 to-accent text-white px-8 py-3 rounded-lg font-bold hover:shadow-[0_0_20px_rgba(0,229,255,0.4)] transition-all">
            + Create Coupon
          </button>
        </div>

        <div class="bg-surface rounded-xl border border-border overflow-hidden shadow-lg">
          <table class="w-full text-sm text-left">
            <thead class="bg-surface2 text-muted border-b border-border">
              <tr>
                <th class="px-6 py-4 font-semibold">Code</th>
                <th class="px-6 py-4 font-semibold">Discount</th>
                <th class="px-6 py-4 font-semibold">Created Date</th>
                <th class="px-6 py-4 font-semibold">Action</th>
              </tr>
            </thead>
            <tbody id="couponsTableBody" class="divide-y divide-border"></tbody>
          </table>
        </div>
      </div>

      <div id="tab-courses" class="hidden">
        <div class="flex items-center justify-between mb-8">
          <h1 class="text-2xl font-bold text-white" style="font-family: 'Syne', sans-serif;">Manage Courses</h1>
          <button onclick="openAddCourse()" class="bg-gradient-to-r from-accent2 to-accent text-white px-6 py-2.5 rounded-lg font-bold hover:shadow-[0_0_20px_rgba(0,229,255,0.4)] transition-all flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Add Course
          </button>
        </div>
        <div id="coursesGrid" class="grid grid-cols-2 gap-8"></div>
      </div>

      <div id="tab-add-course" class="hidden">
        <div class="bg-surface border border-border rounded-2xl p-8 max-w-4xl mx-auto shadow-2xl">
          <h2 class="text-2xl font-bold mb-8" style="color: var(--gold); font-family: 'Syne', sans-serif;" id="courseFormTitle">Add New Course</h2>
          
          <input type="hidden" id="courseId">

          <div class="grid grid-cols-2 gap-6 mb-6">
            <div>
              <label class="block text-sm text-white mb-2">Course Title</label>
              <input type="text" id="courseTitle" placeholder="e.g., Fullstack Blockchain Development" class="admin-input">
            </div>
            <div>
              <label class="block text-sm text-white mb-2">Short Description</label>
              <input type="text" id="courseDesc" placeholder="Brief summary of the course..." class="admin-input">
            </div>
            <div>
              <label class="block text-sm text-white mb-2">Course Price (৳)</label>
              <input type="number" id="coursePrice" placeholder="e.g., 4500" class="admin-input">
            </div>
            <div>
              <label class="block text-sm text-white mb-2">WhatsApp Group Link</label>
              <input type="url" id="courseWaLink" placeholder="https://chat.whatsapp.com/..." class="admin-input">
            </div>
          </div>

          <div class="grid grid-cols-3 gap-6 mb-6">
            <div>
              <label class="block text-sm text-white mb-2">Total Lectures</label>
              <input type="number" id="courseLectures" placeholder="e.g., 300" class="admin-input">
            </div>
            <div>
              <label class="block text-sm text-white mb-2">Total Exercises</label>
              <input type="number" id="courseExercises" placeholder="e.g., 30" class="admin-input">
            </div>
            <div>
              <label class="block text-sm text-white mb-2">Total Assignments</label>
              <input type="number" id="courseAssignments" placeholder="e.g., 15" class="admin-input">
            </div>
          </div>

          <div class="mb-6">
            <label class="block text-sm text-white mb-2">Course Thumbnail</label>
            <div class="flex flex-col gap-3">
              <div class="flex items-center admin-input p-1">
                <label for="imageUploadInput" class="bg-surface2 border border-border text-white px-4 py-2 rounded-md text-sm font-medium hover:bg-bg transition-colors cursor-pointer">Upload Image</label>
                <input type="file" id="imageUploadInput" accept="image/*" class="hidden">
                <input type="text" id="courseThumbnail" placeholder=" Or paste image URL here..." class="bg-transparent border-none text-white outline-none ml-3 w-full text-sm">
              </div>
              <div id="imagePreviewContainer" class="hidden w-full h-48 rounded-lg border border-border overflow-hidden bg-bg flex items-center justify-center">
                <img id="imagePreview" src="" class="h-full object-contain">
              </div>
            </div>
          </div>

          <div class="mb-8">
            <div class="flex items-center justify-between mb-3">
              <label class="block text-sm text-white font-bold">Course Curriculum Builder</label>
              <button type="button" onclick="addModuleUI()" class="text-accent text-sm font-bold flex items-center gap-1 hover:underline">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg> Add Module
              </button>
            </div>
            <div class="p-5 border border-border rounded-xl bg-bg" id="curriculumBuilder">
              <p class="text-muted text-sm text-center py-4 empty-curriculum-msg">No modules added yet. Click "Add Module" to start building.</p>
            </div>
          </div>

          <div class="mb-8 flex items-center gap-3 bg-surface2 p-4 rounded-lg border border-border">
            <input type="checkbox" id="courseActive" checked class="w-5 h-5 accent-gold">
            <label class="text-sm font-bold text-white">Publish Course Immediately</label>
          </div>

          <button type="button" onclick="saveCourse()" class="btn-gold w-full py-4 rounded-lg text-sm tracking-wider shadow-lg">
            ADD COURSE
          </button>
        </div>
      </div>

    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
let allUsers = []; let allCourses = []; let allCoupons = [];

document.addEventListener('DOMContentLoaded', async () => {
  await loadUsers(); await loadCourses(); await loadCoupons(); renderOverview();
});

async function logout() { await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = 'login.html'; }

function showTab(name) {
  ['overview','users','courses','add-course','coupons'].forEach(t => {
    document.getElementById(`tab-${t}`)?.classList.add('hidden');
    document.querySelector(`[data-tab="${t}"]`)?.classList.remove('active');
  });
  document.getElementById(`tab-${name}`)?.classList.remove('hidden');
  document.querySelector(`[data-tab="${name}"]`)?.classList.add('active');
}

async function loadUsers() {
  const res = await fetch('/api/admin/users', { credentials: 'include' });
  const data = await res.json(); if(data.success) { allUsers = data.users; renderUsersTable(); }
}
async function loadCourses() {
  const res = await fetch('/api/admin/courses', { credentials: 'include' });
  const data = await res.json(); if(data.success) { allCourses = data.courses; renderCoursesGrid(); }
}
async function loadCoupons() {
  try {
    const res = await fetch('/api/admin/coupons', { credentials: 'include' });
    const data = await res.json(); 
    if(data.success) { allCoupons = data.coupons; renderCouponsTable(); }
  } catch(e) {}
}

function renderOverview() {
  document.getElementById('stat-users').textContent = allUsers.length;
  document.getElementById('stat-courses').textContent = allCourses.length;
}

function renderUsersTable() {
  const tbody = document.getElementById('usersTableBody');
  tbody.innerHTML = allUsers.map(u => `
    <tr class="hover:bg-surface2 transition-colors">
      <td class="px-6 py-4 font-medium text-white">${esc(u.username)}</td>
      <td class="px-6 py-4 text-muted">${esc(u.email)}</td>
      <td class="px-6 py-4 text-muted">${fmtDate(u.created_at)}</td>
      <td class="px-6 py-4">${(u.courses || []).map(c => `<span class="badge badge-blue mr-2 mb-1">${esc(c.title)}</span>`).join('')}</td>
      <td class="px-6 py-4"><button class="border border-accent text-accent px-4 py-2 rounded-lg text-xs font-bold">MANAGE</button></td>
    </tr>`).join('');
}

function renderCouponsTable() {
  const tbody = document.getElementById('couponsTableBody');
  tbody.innerHTML = allCoupons.map(c => `
    <tr class="hover:bg-surface2 transition-colors">
      <td class="px-6 py-4 font-bold text-accent">${esc(c.code)}</td>
      <td class="px-6 py-4 text-white font-bold">${esc(c.discount_percent)}%</td>
      <td class="px-6 py-4 text-muted">${fmtDate(c.created_at)}</td>
      <td class="px-6 py-4"><button onclick="deleteCoupon(${c.id})" class="text-accent3 hover:text-red-400 font-bold">Delete</button></td>
    </tr>`).join('');
}

async function createCoupon() {
  const code = document.getElementById('newCouponCode').value;
  const discount = document.getElementById('newCouponDiscount').value;
  if(!code || !discount) return showToast('Fill all fields', 'error');
  const res = await fetch('/api/admin/coupons', {
    method: 'POST', credentials: 'include', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({code, discount})
  });
  if((await res.json()).success) { showToast('Coupon created', 'success'); await loadCoupons(); }
}

async function deleteCoupon(id) {
  if(!confirm('Delete coupon?')) return;
  const res = await fetch('/api/admin/coupons', {
    method: 'DELETE', credentials: 'include', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({id})
  });
  if((await res.json()).success) { showToast('Deleted', 'success'); await loadCoupons(); }
}

document.getElementById('imageUploadInput').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = function(event) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
      const maxWidth = 800; let width = img.width; let height = img.height;
      if (width > maxWidth) { height = Math.round((height * maxWidth) / width); width = maxWidth; }
      canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
      const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
      document.getElementById('courseThumbnail').value = compressedBase64;
      document.getElementById('imagePreview').src = compressedBase64;
      document.getElementById('imagePreviewContainer').classList.remove('hidden');
    }; img.src = event.target.result;
  }; reader.readAsDataURL(file);
});

function renderCoursesGrid() {
  document.getElementById('coursesGrid').innerHTML = allCourses.map(c => {
    let stats = { lectures: 0, exercises: 0, assignments: 0, price: 0 };
    try { const p = typeof c.modules === 'string' ? JSON.parse(c.modules) : c.modules; if (p) stats = p; } catch(e) {}
    return `
    <div class="bg-surface rounded-2xl shadow-lg border border-border flex flex-col">
      ${c.thumbnail_url ? `<img src="${esc(c.thumbnail_url)}" class="w-full h-48 object-cover">` : `<div class="w-full h-48 bg-surface2"></div>`}
      <div class="p-6 flex-1 flex flex-col">
        <h3 class="font-bold text-white text-xl mb-2">${esc(c.title)}</h3>
        <p class="text-accent font-bold mb-4">Price: ৳${stats.price || 'Free'}</p>
        <div class="flex gap-3 mt-auto">
          <button onclick="openEditCourse(${c.id})" class="flex-1 bg-surface2 text-white py-2 rounded-lg font-bold hover:bg-border">EDIT</button>
          <button onclick="deleteCourse(${c.id})" class="flex-1 border border-accent3 text-accent3 py-2 rounded-lg font-bold">DELETE</button>
        </div>
      </div>
    </div>`
  }).join('');
}

const builderContainer = document.getElementById('curriculumBuilder');
function addModuleUI(title = '') {
  document.querySelector('.empty-curriculum-msg')?.remove();
  const h = `<div class="bg-surface2 border border-border rounded-lg p-5 mb-4 module-block">
      <div class="flex justify-between items-center mb-4">
        <input type="text" placeholder="Module Title" class="admin-input font-bold text-lg w-full mr-4 module-title" value="${esc(title)}">
        <button type="button" onclick="this.closest('.module-block').remove()" class="text-accent3 font-bold">✕</button>
      </div>
      <div class="lectures-container space-y-3 pl-4 border-l-2 border-border mb-4"></div>
      <button type="button" onclick="addLectureUI(this.previousElementSibling)" class="text-accent text-sm font-bold">+ Add Lecture</button>
    </div>`;
  builderContainer.insertAdjacentHTML('beforeend', h);
  return builderContainer.lastElementChild;
}

function addLectureUI(container, title = '', url = '', duration = '') {
  const h = `<div class="lecture-block flex items-start gap-3 bg-bg p-3 rounded-md border border-border">
      <div class="flex-1 space-y-3">
        <input type="text" placeholder="Lecture Title" class="admin-input text-sm lecture-title" value="${esc(title)}">
        <div class="flex gap-3">
          <input type="url" placeholder="YouTube URL" class="admin-input text-sm flex-1 lecture-url" value="${esc(url)}">
          <input type="text" placeholder="Duration" class="admin-input text-sm w-1/3 lecture-duration" value="${esc(duration)}">
        </div>
      </div>
      <button type="button" onclick="this.closest('.lecture-block').remove()" class="text-muted hover:text-accent3 mt-2">✕</button>
    </div>`;
  container.insertAdjacentHTML('beforeend', h);
}

function openAddCourse() {
  document.getElementById('courseFormTitle').textContent = 'Add New Course';
  document.getElementById('courseId').value = '';
  document.querySelectorAll('.admin-input').forEach(i => i.value = '');
  builderContainer.innerHTML = '<p class="text-muted text-sm text-center py-4 empty-curriculum-msg">Click "Add Module" to start.</p>';
  document.getElementById('imagePreviewContainer').classList.add('hidden');
  showTab('add-course');
}

function openEditCourse(id) {
  const course = allCourses.find(c => c.id === id);
  if (!course) return;
  document.getElementById('courseFormTitle').textContent = 'Edit Course';
  document.getElementById('courseId').value = course.id;
  document.getElementById('courseTitle').value = course.title || '';
  document.getElementById('courseDesc').value = course.description || '';
  document.getElementById('courseThumbnail').value = course.thumbnail_url || '';
  
  if(course.thumbnail_url) { document.getElementById('imagePreview').src = course.thumbnail_url; document.getElementById('imagePreviewContainer').classList.remove('hidden'); }
  
  let mods = { lectures: '', exercises: '', assignments: '', price: '', whatsappLink: '', curriculum: [] };
  try { const p = typeof course.modules === 'string' ? JSON.parse(course.modules) : course.modules; if(p) mods = p; } catch(e) {}

  document.getElementById('coursePrice').value = mods.price || '';
  document.getElementById('courseWaLink').value = mods.whatsappLink || '';
  document.getElementById('courseLectures').value = mods.lectures || '';
  document.getElementById('courseExercises').value = mods.exercises || '';
  document.getElementById('courseAssignments').value = mods.assignments || '';
  
  builderContainer.innerHTML = '';
  if(mods.curriculum) mods.curriculum.forEach(m => {
    const modEl = addModuleUI(m.moduleTitle);
    m.lectures.forEach(l => addLectureUI(modEl.querySelector('.lectures-container'), l.title, l.url, l.duration));
  });
  showTab('add-course');
}

async function saveCourse() {
  const id = document.getElementById('courseId').value;
  const title = document.getElementById('courseTitle').value;
  if (!title) return showToast('Title required', 'error');

  const curriculum = [];
  document.querySelectorAll('.module-block').forEach(modEl => {
    const moduleTitle = modEl.querySelector('.module-title').value.trim();
    const lectures = [];
    modEl.querySelectorAll('.lecture-block').forEach(lecEl => {
      const title = lecEl.querySelector('.lecture-title').value.trim();
      const url = lecEl.querySelector('.lecture-url').value.trim();
      if(title || url) lectures.push({ title, url, duration: lecEl.querySelector('.lecture-duration').value.trim() });
    });
    if(moduleTitle || lectures.length > 0) curriculum.push({ moduleTitle, lectures });
  });

  const modulesData = {
    price: document.getElementById('coursePrice').value || 0,
    whatsappLink: document.getElementById('courseWaLink').value || '',
    lectures: document.getElementById('courseLectures').value || 0,
    exercises: document.getElementById('courseExercises').value || 0,
    assignments: document.getElementById('courseAssignments').value || 0,
    curriculum
  };

  const body = {
    title, description: document.getElementById('courseDesc').value,
    thumbnail_url: document.getElementById('courseThumbnail').value,
    modules: JSON.stringify(modulesData), is_active: document.getElementById('courseActive').checked,
  };
  if (id) body.id = parseInt(id);

  const res = await fetch('/api/admin/courses', { method: id ? 'PUT' : 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  if ((await res.json()).success) { showToast('Saved!', 'success'); await loadCourses(); showTab('courses'); }
}

async function deleteCourse(id) {
  if (!confirm('Delete?')) return;
  await fetch('/api/admin/courses', { method: 'DELETE', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id }) });
  await loadCourses();
}

function showToast(msg, type = 'success') { const el = document.getElementById('toast'); el.textContent = msg; el.className = `toast ${type} show`; setTimeout(() => el.classList.remove('show'), 3000); }
function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) { return iso ? new Date(iso).toLocaleDateString() : '—'; }
</script>
